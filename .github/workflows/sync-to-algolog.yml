name: Sync to algolog
on:
  push:
    branches:
      - main
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 개인 레포 체크아웃
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: algolog 레포 체크아웃
        uses: actions/checkout@v3
        with:
          repository: Minji6/algolog
          token: ${{ secrets.ALGOLOG_TOKEN }}
          path: algolog-repo
      - name: 변경된 파일 복사
        run: |
          git show --name-only --format="" HEAD | while read file; do
            if [ -f "$file" ] && [[ "$file" != .github/* ]]; then
              mkdir -p "algolog-repo/민지/$(dirname $file)"
              cp "$file" "algolog-repo/민지/$file"
            fi
          done
      - name: algolog 레포에 push
        run: |
          cd algolog-repo
          git config user.name "Minji6"
          git config user.email "Minji6@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "sync: $(git -C $GITHUB_WORKSPACE log --format=%s -1 HEAD)"
          git push